# nome da aplicação
spring.application.name=portal-transparencia

#config de conexão com o Mysql
spring.datasource.url=jdbc:mysql://localhost:3306/db_portal_transparencia?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234

#config do JPA e hibernate - serve de ponte com o banco

#vai garantir que o banco sempre esteja atualizado
spring.jpa.hibernate.ddl-auto=update

#printa no console todos os comandos sql que o java ta executando - serve pra depuração. 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect